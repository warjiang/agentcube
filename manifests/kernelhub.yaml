apiVersion: v1
kind: Service
metadata:
  name: kernelhub
  labels:
    app: kernelhub
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
  selector:
    app: kernelhub
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kernelhub
  labels:
    app: kernelhub
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kernelhub
  template:
    metadata:
      labels:
        app: kernelhub
    spec:
      containers:
        - name: kernelhub
          image: agentcube/kernelhub:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: KERNELHUB_AUTH_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: agentcube-secrets
                  key: auth-public-key
            - name: GOMEMLIMIT
              value: "256MiB"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
